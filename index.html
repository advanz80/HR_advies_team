<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Advies Team — Driessen Groep</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{font-family:'DM Sans','Segoe UI',sans-serif;background:#1A1D21}

  @keyframes typingPulse{0%,80%,100%{opacity:.3}40%{opacity:1}}
  @keyframes msgAppear{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .typing-dot{animation:typingPulse 1.2s ease-in-out infinite;font-size:10px;color:#8B8FA3}
  .msg-appear{animation:msgAppear .3s ease-out}
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-thumb{background:#D1D2D3;border-radius:3px}
  ::-webkit-scrollbar-track{background:transparent}

  .app{display:flex;width:100%;height:100vh}

  /* Sidebar */
  .sidebar{width:270px;min-width:270px;background:#1A1D21;border-right:1px solid #35373B;display:flex;flex-direction:column;overflow-y:auto}
  .ws-header{padding:14px 16px;border-bottom:1px solid #35373B;display:flex;align-items:center;gap:10px}
  .ws-icon{width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,#C9A063,#E8C97A);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff}
  .ws-name{font-weight:700;font-size:15px;color:#fff}
  .ws-sub{font-size:11px;color:#8B8FA3}
  .section-label{font-size:12px;font-weight:700;color:#8B8FA3;letter-spacing:.04em;padding:0 4px 6px}
  .channel-active{padding:5px 10px;border-radius:6px;background:#1164A3;color:#fff;font-weight:600;font-size:14px}
  .channel-inactive{padding:5px 10px;color:#8B8FA3;font-size:14px;margin-top:2px}

  .team-member{display:flex;align-items:center;gap:10px;padding:6px 10px;font-size:14px;color:#D1D2D3;border-radius:6px;cursor:default;position:relative}
  .team-member:hover{background:#2C2D31}
  .member-avatar-wrap{position:relative;width:36px;height:36px;flex-shrink:0}
  .member-avatar{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;background-size:cover;background-position:center;overflow:hidden;position:relative}
  .member-avatar img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;border-radius:8px}
  .avatar-upload-btn{position:absolute;bottom:-2px;right:-2px;width:16px;height:16px;border-radius:50%;background:#C9A063;border:1.5px solid #1A1D21;display:none;align-items:center;justify-content:center;font-size:9px;color:#fff;cursor:pointer;line-height:1}
  .team-member:hover .avatar-upload-btn{display:flex}
  .status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;position:absolute;bottom:-1px;right:-1px;border:2px solid #1A1D21}
  .status-online{background:#44b700}.status-away{background:#f5a623}.status-offline{background:#666}
  .member-info{flex:1;min-width:0}
  .member-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .member-role{font-size:11px;color:#5A5A6A}

  .config-panel{margin-top:auto;padding:12px 16px;border-top:1px solid #35373B}
  .config-label{font-size:11px;color:#8B8FA3;margin-bottom:4px;font-weight:700;letter-spacing:.03em}
  .config-row{display:flex;gap:6px;margin-bottom:6px}
  .config-input{flex:1;padding:7px 10px;border-radius:6px;border:1px solid #35373B;background:#2C2D31;color:#D1D2D3;font-size:12px;font-family:'Consolas','Monaco',monospace;outline:none}
  .config-input:focus{border-color:#C9A063}
  .config-save-btn{padding:7px 12px;border-radius:6px;border:none;background:#35373B;color:#8B8FA3;font-size:11px;cursor:pointer;font-family:inherit;font-weight:600;white-space:nowrap}
  .config-save-btn:hover{background:#45474B;color:#D1D2D3}
  .config-saved{color:#44b700!important}
  .config-hint{font-size:10px;color:#5A5A6A;line-height:1.4;margin-bottom:8px}
  .connect-btn{width:100%;padding:9px 0;border-radius:8px;border:none;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s}
  .connect-btn-ready{background:linear-gradient(135deg,#C9A063,#E8C97A);color:#1A1D21}
  .connect-btn-ready:hover{filter:brightness(1.05)}
  .connect-btn-connected{background:#2EAA6F;color:#fff}

  /* Main chat */
  .main-chat{flex:1;display:flex;flex-direction:column;background:#fff;overflow:hidden}
  .chat-header{padding:10px 20px;border-bottom:1px solid #E8E8E8;display:flex;align-items:center;justify-content:space-between}
  .chat-title{font-weight:700;font-size:16px;color:#1D1E25}
  .chat-subtitle{font-size:12px;color:#8B8FA3;margin-top:2px}
  .header-avatars{display:flex;gap:4px}
  .messages-area{flex:1;overflow-y:auto;padding:16px 0}
  .input-area{padding:10px 20px 14px;border-top:1px solid #E8E8E8}
  .input-row{display:flex;gap:8px;align-items:flex-end}
  .chat-input{flex:1;padding:10px 14px;border:1px solid #D1D2D3;border-radius:8px;font-size:14px;font-family:inherit;background:#FAFAFA;outline:none;resize:none;min-height:42px;max-height:120px;line-height:1.4}
  .chat-input:focus{border-color:#C9A063;background:#fff}
  .chat-input:disabled{background:#F0F0F0;color:#999}
  .send-btn{padding:10px 18px;border:none;border-radius:8px;background:linear-gradient(135deg,#C9A063,#E8C97A);color:#1A1D21;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
  .send-btn:hover{filter:brightness(1.05)}
  .send-btn:disabled{background:#E8E8E8;color:#999;cursor:not-allowed;filter:none}

  /* Messages */
  .msg-row{display:flex;gap:12px;padding:6px 20px;align-items:flex-start;max-width:85%}
  .msg-row-agent{justify-content:flex-start}
  .msg-row-user{margin-left:auto;flex-direction:row-reverse}
  .chat-avatar{width:44px;height:44px;min-width:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;letter-spacing:-.02em;background-size:cover;background-position:center;overflow:hidden;position:relative;flex-shrink:0}
  .chat-avatar img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;border-radius:10px}
  .msg-name{font-weight:700;font-size:15px}
  .msg-time{font-size:11px;color:#8B8FA3}
  .msg-bubble{padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.6;margin-top:4px;white-space:pre-wrap}
  .msg-bubble-agent{background:#F0F2F5;color:#1D1E25;border-top-left-radius:4px}
  .msg-bubble-user{background:#C9A063;color:#fff;border-top-right-radius:4px}
  .msg-bubble-user a{color:#fff}
  .msg-bubble-directed{background:#F0F2F5;color:#1D1E25;border-top-left-radius:4px;border-left:3px solid}

  .card{margin-top:8px;border:1px solid #E0E3EB;border-radius:8px;overflow:hidden;background:#fff}
  .card-header{padding:10px 14px;color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px}
  .card-body{padding:14px;font-size:13px;line-height:1.6;color:#3A3A5C;white-space:pre-wrap}

  .handoff{display:flex;align-items:center;gap:8px;padding:4px 20px;margin:4px 0}
  .handoff-line{flex:1;height:1px;background:#E8E8E8}
  .handoff-label{font-size:11px;color:#8B8FA3;white-space:nowrap;display:flex;align-items:center;gap:4px}

  .conn-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
  .conn-badge-off{background:#FFF3E0;color:#E65100}
  .conn-badge-on{background:#E8F5E9;color:#2E7D32}

  .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:#8B8FA3}
  .welcome-emoji{font-size:48px}
  .welcome-title{font-size:20px;font-weight:700;color:#1D1E25}
  .welcome-text{font-size:14px;text-align:center;max-width:440px;line-height:1.6}

  .hidden-upload{display:none}

  @media(max-width:700px){.sidebar{display:none}}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="ws-header">
      <div class="ws-icon">D</div>
      <div><div class="ws-name">Driessen Groep</div><div class="ws-sub">HR Advies Team</div></div>
    </div>
    <div style="padding:12px 12px 6px">
      <div class="section-label">Kanalen</div>
      <div class="channel-active"># hr-advies</div>
      <div class="channel-inactive"># algemeen</div>
    </div>
    <div style="padding:12px 12px 6px" id="team-list"></div>
    <div class="config-panel">
      <div class="config-label">n8n Webhook URL</div>
      <div class="config-row">
        <input type="text" class="config-input" id="webhook-url" placeholder="https://n8n.example.com/webhook/xxx/chat">
        <button class="config-save-btn" id="save-url-btn" onclick="saveUrl()">Opslaan</button>
      </div>
      <div class="config-hint">Chat Trigger → Production URL + <code>/chat</code></div>
      <button class="connect-btn connect-btn-ready" id="connect-btn" onclick="toggleConnection()">Verbinden</button>
    </div>
  </div>
  <div class="main-chat">
    <div class="chat-header">
      <div>
        <div class="chat-title"># hr-advies</div>
        <div class="chat-subtitle"><span id="conn-status" class="conn-badge conn-badge-off">● Niet verbonden</span></div>
      </div>
      <div class="header-avatars" id="header-avatars"></div>
    </div>
    <div class="messages-area" id="messages-area">
      <div class="welcome" id="welcome">
        <div class="welcome-emoji">👋</div>
        <div class="welcome-title">HR Advies Team</div>
        <div class="welcome-text">Vul links je n8n webhook URL in en klik <strong>Verbinden</strong>.<br>Hover over een teamlid om een profielfoto toe te voegen.</div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea class="chat-input" id="chat-input" placeholder="Verbind eerst met n8n..." rows="1" disabled onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>Verstuur</button>
      </div>
    </div>
  </div>
</div>
<input type="file" class="hidden-upload" id="avatar-upload" accept="image/*" onchange="handleAvatarUpload(event)">

<script>
// ═══ AGENTS ═══
const AGENTS={
  wendai:  {name:"WendAI",             role:"Regisseur",       color:"#C9A063",initials:"WA",gradient:"linear-gradient(135deg,#C9A063,#E8C97A)",icon:"🎯",photo:"Avatars/wendai.png"},
  sophie:  {name:"Dr. Sophie Vermeer", role:"Wetenschapper",   color:"#5B6ABF",initials:"SV",gradient:"linear-gradient(135deg,#5B6ABF,#7B8AD4)",icon:"🔬",photo:"Avatars/sophie.png"},
  daan:    {name:"Daan de Groot",       role:"Data Verzamelaar",color:"#2EAA6F",initials:"DG",gradient:"linear-gradient(135deg,#2EAA6F,#4DC98A)",icon:"📊",photo:"Avatars/daan.png"},
  marielle:{name:"Mariëlle Bakker",     role:"HR Adviseur",     color:"#D4566A",initials:"MB",gradient:"linear-gradient(135deg,#D4566A,#E87A8D)",icon:"💼",photo:"Avatars/marielle.png"},
  ali:     {name:"Ali Mhmid",           role:"Jurist",          color:"#3A3A5C",initials:"AM",gradient:"linear-gradient(135deg,#3A3A5C,#5A5A7C)",icon:"⚖️",photo:"Avatars/ali.png"},
  lisa:    {name:"Lisa van Dijk",        role:"Tekstschrijver",  color:"#B35CC9",initials:"LD",gradient:"linear-gradient(135deg,#B35CC9,#D07CE0)",icon:"✍️",photo:"Avatars/lisa.png"},
};
const AK=Object.keys(AGENTS);

// ═══ STATE ═══
let connected=false,sessionId=null,sending=false,avatarPhotos={},uploadingFor=null;

// ═══ INIT ═══
(function(){
  try{const s=localStorage.getItem("hr_team_avatars");if(s)avatarPhotos=JSON.parse(s)}catch(e){}
  buildTeamList();buildHeaderAvatars();
  const ta=document.getElementById("chat-input");
  ta.addEventListener("input",()=>{ta.style.height="auto";ta.style.height=Math.min(ta.scrollHeight,120)+"px"});
  // URL priority: ?url= parameter > localStorage
  const params=new URLSearchParams(window.location.search);
  const paramUrl=params.get("url");
  const savedUrl=localStorage.getItem("n8n_webhook_url");
  const webhookUrl=paramUrl||savedUrl;
  if(webhookUrl){
    document.getElementById("webhook-url").value=webhookUrl;
    if(paramUrl)localStorage.setItem("n8n_webhook_url",paramUrl);
    setTimeout(()=>connect(),300);
  }
})();

function getPhoto(k){return avatarPhotos[k]||AGENTS[k]?.photo||null}

function buildTeamList(){
  document.getElementById("team-list").innerHTML='<div class="section-label">Teamleden</div>'+
    AK.map(k=>{const a=AGENTS[k],ph=getPhoto(k);
      return`<div class="team-member" id="member-${k}"><div class="member-avatar-wrap"><div class="member-avatar" id="sa-${k}" style="background:${a.gradient}">${ph?`<img src="${ph}" onerror="this.remove()">`:a.initials}</div><span class="status-dot status-offline" id="st-${k}"></span><div class="avatar-upload-btn" onclick="triggerUpload('${k}')" title="Foto wijzigen">📷</div></div><div class="member-info"><div class="member-name">${a.name}</div><div class="member-role">${a.role}</div></div></div>`}).join("");
}
function buildHeaderAvatars(){
  document.getElementById("header-avatars").innerHTML=
    AK.slice(0,5).map(k=>{const a=AGENTS[k],ph=getPhoto(k);
      return`<div class="chat-avatar" id="ha-${k}" style="background:${a.gradient};width:34px;height:34px;min-width:34px;font-size:12px">${ph?`<img src="${ph}" onerror="this.remove()">`:a.initials}</div>`}).join("")+
    `<div class="chat-avatar" style="background:#E8E8E8;color:#8B8FA3;font-size:12px;font-weight:700;width:34px;height:34px;min-width:34px">+1</div>`;
}

// ═══ AVATARS ═══
function triggerUpload(k){uploadingFor=k;document.getElementById("avatar-upload").click()}
function handleAvatarUpload(e){
  const f=e.target.files[0];if(!f||!uploadingFor)return;
  const r=new FileReader();r.onload=function(ev){
    const img=new Image();img.onload=function(){
      const c=document.createElement("canvas"),sz=100;c.width=sz;c.height=sz;
      const ctx=c.getContext("2d"),m=Math.min(img.width,img.height);
      ctx.drawImage(img,(img.width-m)/2,(img.height-m)/2,m,m,0,0,sz,sz);
      avatarPhotos[uploadingFor]=c.toDataURL("image/jpeg",.8);
      try{localStorage.setItem("hr_team_avatars",JSON.stringify(avatarPhotos))}catch(e){}
      updateAv(uploadingFor);uploadingFor=null;
    };img.src=ev.target.result;
  };r.readAsDataURL(f);e.target.value="";
}
function updateAv(k){
  const ph=getPhoto(k),a=AGENTS[k];
  const sa=document.getElementById(`sa-${k}`);if(sa)sa.innerHTML=ph?`<img src="${ph}" onerror="this.remove()">`:a.initials;
  const ha=document.getElementById(`ha-${k}`);if(ha)ha.innerHTML=ph?`<img src="${ph}" onerror="this.remove()">`:a.initials;
}
function avHTML(k){const a=AGENTS[k],ph=getPhoto(k);return`<div class="chat-avatar" style="background:${a.gradient}">${ph?`<img src="${ph}" onerror="this.remove()">`:a.initials}</div>`}

// ═══ URL ═══
function saveUrl(){
  const u=document.getElementById("webhook-url").value.trim();
  if(u){localStorage.setItem("n8n_webhook_url",u);const b=document.getElementById("save-url-btn");b.textContent="✓ Opgeslagen";b.classList.add("config-saved");setTimeout(()=>{b.textContent="Opslaan";b.classList.remove("config-saved")},2000)}
}

// ═══ CONNECTION ═══
function toggleConnection(){connected?disconnect():connect()}
function connect(){
  const u=document.getElementById("webhook-url").value.trim();
  if(!u){alert("Vul een webhook URL in");return}
  localStorage.setItem("n8n_webhook_url",u);
  sessionId="s_"+Math.random().toString(36).substr(2,10);
  connected=true;updateUI();
  const w=document.getElementById("welcome");if(w)w.style.display="none";
  addMsg("wendai","Hallo, ik ben WendAI, de regisseur van je HR-advies team. Met welke HR uitdaging kan ik je helpen?");
}
function disconnect(){connected=false;sessionId=null;updateUI()}
function updateUI(){
  const b=document.getElementById("connect-btn"),s=document.getElementById("conn-status"),i=document.getElementById("chat-input"),sb=document.getElementById("send-btn");
  if(connected){b.textContent="Verbreken";b.className="connect-btn connect-btn-connected";s.className="conn-badge conn-badge-on";s.innerHTML="● Verbonden";i.disabled=false;sb.disabled=false;i.placeholder="Stuur een bericht naar #hr-advies...";i.focus();AK.forEach(k=>setSt(k,"online"))}
  else{b.textContent="Verbinden";b.className="connect-btn connect-btn-ready";s.className="conn-badge conn-badge-off";s.innerHTML="● Niet verbonden";i.disabled=true;sb.disabled=true;i.placeholder="Verbind eerst met n8n...";AK.forEach(k=>setSt(k,"offline"))}
}
function setSt(k,s){const d=document.getElementById(`st-${k}`);if(d)d.className=`status-dot status-${s}`}

// ═══ MESSAGING ═══
function handleKey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage()}}

async function sendMessage(){
  const inp=document.getElementById("chat-input"),text=inp.value.trim();
  if(!text||!connected||sending)return;
  sending=true;inp.value="";inp.style.height="auto";document.getElementById("send-btn").disabled=true;
  addUser(text);showTyping("wendai");
  try{
    const url=document.getElementById("webhook-url").value.trim();
    const res=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action:"sendMessage",chatInput:text,sessionId})});
    removeTyping();
    if(!res.ok)throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    const ct=res.headers.get("content-type")||"";
    if(ct.includes("text/event-stream")||ct.includes("text/plain")){await handleStream(res)}
    else{const d=await res.json();const out=d.output||d.response||d.text||(Array.isArray(d)?d[0]?.output||d[0]?.response||JSON.stringify(d):JSON.stringify(d));await processOutput(out)}
  }catch(err){removeTyping();addSystem(`Verbindingsfout: ${err.message}`);console.error(err)}
  sending=false;document.getElementById("send-btn").disabled=false;document.getElementById("chat-input").focus();
}

async function handleStream(res){
  const reader=res.body.getReader(),dec=new TextDecoder();let buf="",full="";
  while(true){const{done,value}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});const lines=buf.split("\n");buf=lines.pop()||"";for(const ln of lines){if(ln.startsWith("data: ")){const d=ln.slice(6);if(d==="[DONE]")continue;try{const p=JSON.parse(d);full+=p.token||p.text||p.chunk||""}catch{full+=d}}else if(ln.trim()&&!ln.startsWith(":"))full+=ln}}
  removeTyping();if(full.trim())processOutput(full.trim());
}

// ═══ OUTPUT PROCESSING — tries JSON first, falls back to text parsing ═══
async function processOutput(raw){
  const jsonMessages = tryParseJSON(raw);
  if(jsonMessages){
    await displayJSONMessages(jsonMessages);
    return;
  }
  displayTextFallback(raw);
}

function tryParseJSON(raw){
  let text = raw.trim();
  // Strip markdown code fences if present
  if(text.startsWith("```")){
    text = text.replace(/^```(?:json)?\s*/,"").replace(/\s*```$/,"");
  }
  try{
    const parsed = JSON.parse(text);
    if(Array.isArray(parsed) && parsed.length > 0 && parsed[0].agent && parsed[0].text){
      return parsed;
    }
  }catch(e){}

  // Try to find JSON array within the text
  const match = text.match(/\[[\s\S]*\]/);
  if(match){
    try{
      const parsed = JSON.parse(match[0]);
      if(Array.isArray(parsed) && parsed.length > 0 && parsed[0].agent && parsed[0].text){
        return parsed;
      }
    }catch(e){}
  }
  return null;
}

function wait(ms){return new Promise(r=>setTimeout(r,ms))}

async function displayJSONMessages(messages){
  let prevAgent = null;

  for(let i=0; i<messages.length; i++){
    const msg = messages[i];
    const agentKey = msg.agent && AGENTS[msg.agent] ? msg.agent : "wendai";
    const toAgent = msg.to && AGENTS[msg.to] ? msg.to : null;
    const text = msg.text || "";
    if(!text.trim()) continue;

    // Typing delay scales with text length — longer feels more natural
    const typingDelay = Math.min(1500 + text.length * 5, 8000);

    // Show handoff when agent changes
    if(prevAgent && agentKey !== prevAgent){
      addHandoff(prevAgent, agentKey);
      await wait(600);
    }

    // Show typing indicator before this message (skip for the first)
    if(i > 0){
      showTyping(agentKey);
      await wait(typingDelay);
      removeTyping();
    }

    // Render the actual message
    if(toAgent){
      addDirectedMsg(agentKey, toAgent, text);
    } else if(agentKey === "wendai"){
      const mentioned = detectMention(text);
      if(mentioned){
        addMention("wendai", mentioned, text);
      } else {
        addMsg("wendai", text);
      }
    } else {
      addAgentReply(agentKey, text);
    }

    // Pause so user can read before next message
    await wait(1000);
    prevAgent = agentKey;
  }
}

function detectMention(text){
  const patterns=[
    {agent:"sophie",  re:/(?:schakel|roep|vraag|ga).*?(?:wetenschapper|sophie)/i},
    {agent:"daan",    re:/(?:schakel|roep|vraag|ga).*?(?:data\s*verzamelaar|daan)/i},
    {agent:"marielle",re:/(?:schakel|roep|vraag|ga).*?(?:hr[- ]?adviseur|mari[eë]lle)/i},
    {agent:"ali",     re:/(?:schakel|roep|vraag|ga).*?(?:jurist|ali)/i},
    {agent:"lisa",    re:/(?:schakel|roep|vraag|ga).*?(?:tekstschrijver|lisa)/i},
  ];
  for(const p of patterns){if(p.re.test(text))return p.agent}
  return null;
}

// ═══ TEXT FALLBACK (for non-JSON responses) ═══
const OUTPUT_RE=[
  {agent:"sophie",  re:/(?:de\s+)?wetenschapper\s+heeft\s+/i},{agent:"sophie",  re:/(?:de\s+)?wetenschapper\s*:/i},
  {agent:"daan",    re:/(?:de\s+)?data\s*verzamelaar\s+heeft\s+/i},{agent:"daan",    re:/(?:de\s+)?data\s*verzamelaar\s*:/i},
  {agent:"marielle",re:/(?:de\s+)?(?:hr[- ]?)?adviseur\s+heeft\s+/i},{agent:"marielle",re:/(?:de\s+)?(?:hr[- ]?)?adviseur\s*:/i},
  {agent:"ali",     re:/(?:de\s+)?jurist\s+heeft\s+/i},{agent:"ali",     re:/(?:de\s+)?jurist\s*:/i},
  {agent:"lisa",    re:/(?:de\s+)?tekstschrijver\s+heeft\s+/i},{agent:"lisa",    re:/(?:de\s+)?tekstschrijver\s*:/i},
];
const REGISSEUR_RE=[/dit betekent/i,/voor jouw situatie/i,/heb je (?:hier\s+)?vragen/i,/wil je dat ik/i,/ik ga nu/i,/ik schakel/i,/als volgende stap/i,/samengevat/i];

function displayTextFallback(text){
  const paras=text.split(/\n{2,}/);let cur="wendai",buf=[];
  function flush(){
    if(!buf.length)return;const combined=buf.join("\n\n").trim();if(!combined){buf=[];return}
    if(cur==="wendai"){const ann=detectMention(combined);if(ann){addHandoff("wendai",ann);addMention("wendai",ann,combined)}else{addMsg("wendai",combined)}}
    else{addHandoff("wendai",cur);addCard(cur,combined)}
    buf=[];
  }
  for(const para of paras){
    const t=para.trim();if(!t)continue;
    let sw=null;for(const p of OUTPUT_RE){if(p.re.test(t)){sw=p.agent;break}}
    if(sw&&sw!==cur){flush();cur=sw;buf.push(t)}
    else if(cur!=="wendai"&&REGISSEUR_RE.some(r=>r.test(t))){flush();cur="wendai";buf.push(t)}
    else{buf.push(t)}
  }
  flush();
}

// ═══ DOM HELPERS ═══
function timeNow(){return new Date().toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit"})}
function esc(t){const d=document.createElement("div");d.textContent=t;return d.innerHTML}
function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}
function scroll(){const m=document.getElementById("messages-area");requestAnimationFrame(()=>{m.scrollTop=m.scrollHeight})}

function fmt(t){
  let h=t;
  h=h.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
  h=h.replace(/^(#{1,3})\s+(.+)$/gm,(_,hh,tt)=>`<strong style="font-size:${hh.length===1?15:14}px;display:block;margin:6px 0 2px">${tt}</strong>`);
  h=h.replace(/^(📚|📊|💼|⚖️|✍️|🔬|📄|🎯|⚠️|✅|❌|📌|🔑)\s*(.+)$/gm,'<div style="margin:4px 0"><span style="margin-right:4px">$1</span><strong>$2</strong></div>');
  return h;
}

function addUser(text){
  document.getElementById("messages-area").insertAdjacentHTML("beforeend",
    `<div class="msg-appear" style="display:flex;justify-content:flex-end;padding:6px 20px"><div style="max-width:75%"><div style="text-align:right"><span class="msg-time">${timeNow()}</span></div><div class="msg-bubble msg-bubble-user">${esc(text)}</div></div></div>`);scroll();
}

function addMsg(k,text){
  const a=AGENTS[k];
  document.getElementById("messages-area").insertAdjacentHTML("beforeend",
    `<div class="msg-row msg-row-agent msg-appear">${avHTML(k)}<div style="flex:1;min-width:0"><div style="display:flex;align-items:baseline;gap:8px"><span class="msg-name" style="color:${a.color}">${a.name}</span><span style="font-size:12px;color:#8B8FA3;font-weight:500">${a.role}</span><span class="msg-time">${timeNow()}</span></div><div class="msg-bubble msg-bubble-agent">${fmt(esc(text))}</div></div></div>`);scroll();
}

function addCard(k,text){
  const a=AGENTS[k];
  document.getElementById("messages-area").insertAdjacentHTML("beforeend",
    `<div class="msg-row msg-row-agent msg-appear">${avHTML(k)}<div style="flex:1;min-width:0"><div style="display:flex;align-items:baseline;gap:8px"><span class="msg-name" style="color:${a.color}">${a.name}</span><span style="font-size:12px;color:#8B8FA3;font-weight:500">${a.role}</span><span class="msg-time">${timeNow()}</span></div><div class="card"><div class="card-header" style="background:${a.gradient}">${a.icon} ${a.name} — ${a.role}</div><div class="card-body">${fmt(esc(text))}</div></div></div></div>`);scroll();
}

function addMention(from,to,text){
  const f=AGENTS[from],t=AGENTS[to];
  const hl=esc(text).replace(new RegExp(`(${escRe(t.name)}|${escRe(t.role)}|wetenschapper|data\\s*verzamelaar|hr[- ]?adviseur|jurist|tekstschrijver|sophie|daan|mari[eë]lle|ali|lisa)`,"gi"),
    `<span style="background:${t.color}18;color:${t.color};font-weight:600;padding:1px 4px;border-radius:4px">$1</span>`);
  document.getElementById("messages-area").insertAdjacentHTML("beforeend",
    `<div class="msg-row msg-row-agent msg-appear">${avHTML(from)}<div style="flex:1;min-width:0"><div style="display:flex;align-items:baseline;gap:8px"><span class="msg-name" style="color:${f.color}">${f.name}</span><span style="font-size:12px;color:#8B8FA3;font-weight:500">${f.role}</span><span class="msg-time">${timeNow()}</span></div><div class="msg-bubble msg-bubble-agent">${fmt(hl)}</div></div></div>`);scroll();
}

function addDirectedMsg(from,to,text){
  const f=AGENTS[from],t=AGENTS[to];
  const hl=esc(text).replace(new RegExp(`(@${escRe(t.name).split(' ')[0]}|@${escRe(t.name)}|@Klant)`,"gi"),
    (match)=>{
      if(match==="@Klant"||match==="@klant") return `<span style="background:#47556918;color:#475569;font-weight:600;padding:1px 4px;border-radius:4px">${match}</span>`;
      return `<span style="background:${t.color}18;color:${t.color};font-weight:600;padding:1px 4px;border-radius:4px">${match}</span>`;
    });
  document.getElementById("messages-area").insertAdjacentHTML("beforeend",
    `<div class="msg-row msg-row-agent msg-appear">${avHTML(from)}<div style="flex:1;min-width:0"><div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap"><span class="msg-name" style="color:${f.color}">${f.name}</span><span style="font-size:12px;color:#8B8FA3">→</span><span style="font-size:13px;font-weight:600;color:${t.color}">${t.name}</span><span class="msg-time">${timeNow()}</span></div><div class="msg-bubble msg-bubble-directed" style="border-left-color:${t.color}">${fmt(hl)}</div></div></div>`);scroll();
}

function addAgentReply(k,text){
  const a=AGENTS[k];
  document.getElementById("messages-area").insertAdjacentHTML("beforeend",
    `<div class="msg-row msg-row-agent msg-appear">${avHTML(k)}<div style="flex:1;min-width:0"><div style="display:flex;align-items:baseline;gap:8px"><span class="msg-name" style="color:${a.color}">${a.name}</span><span style="font-size:12px;color:#8B8FA3;font-weight:500">${a.role}</span><span class="msg-time">${timeNow()}</span></div><div class="card"><div class="card-header" style="background:${a.gradient}">${a.icon} ${a.name} — ${a.role}</div><div class="card-body">${fmt(esc(text))}</div></div></div></div>`);scroll();
}

function addHandoff(from,to){
  const f=AGENTS[from],t=AGENTS[to];
  document.getElementById("messages-area").insertAdjacentHTML("beforeend",
    `<div class="handoff msg-appear"><div class="handoff-line"></div><div class="handoff-label"><span style="color:${f.color}">${f.initials}</span><span>→</span><span style="color:${t.color};font-weight:600">${t.name}</span></div><div class="handoff-line"></div></div>`);
  setSt(to,"away");setTimeout(()=>{if(connected)setSt(to,"online")},3000);scroll();
}

function addSystem(text){
  document.getElementById("messages-area").insertAdjacentHTML("beforeend",
    `<div class="msg-appear" style="text-align:center;padding:8px 20px"><span style="background:#FFF3E0;color:#E65100;padding:4px 12px;border-radius:10px;font-size:12px;font-weight:600">${esc(text)}</span></div>`);scroll();
}

function showTyping(k){
  removeTyping();const a=AGENTS[k];setSt(k,"away");
  document.getElementById("messages-area").insertAdjacentHTML("beforeend",
    `<div class="msg-row msg-row-agent" id="typing-ind" data-agent="${k}">${avHTML(k)}<div><span class="msg-name" style="color:${a.color}">${a.name}</span><div style="color:#8B8FA3;font-size:13px;margin-top:4px;display:flex;gap:3px;align-items:center"><span class="typing-dot" style="animation-delay:0s">●</span><span class="typing-dot" style="animation-delay:.15s">●</span><span class="typing-dot" style="animation-delay:.3s">●</span><span style="margin-left:4px;font-style:italic">is aan het typen...</span></div></div></div>`);scroll();
}
function removeTyping(){const el=document.getElementById("typing-ind");if(el){const k=el.getAttribute("data-agent");if(k&&connected)setSt(k,"online");el.remove()}}
</script>
